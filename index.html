<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Elon's Money</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
    <img src="img/elon.jpg" alt="Elon Musk" width="200">
    <h1>💸 Spend Elon's Money 💸</h1>
    </center>
    
    <div id="balance">
        <h2>Balance: <span id="balance-amount">$830,000,000,000</span></h2>
    </div>

    <div id="items">
        <div class="item">
            <h3>Tesla Model S</h3>
            <p class="price">$94,990</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <h3>Twitter (X)</h3>
            <p class="price">$44,000,000,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <h3>SpaceX Rocket Launch</h3>
            <p class="price">$67,000,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <h3>Tesla Cybertruck</h3>
            <p class="price">$39,990</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <h3>Neuralink Implant</h3>
            <p class="price">$10,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
