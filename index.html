<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Elon's Money</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
    <img src="img/elon.jpg" alt="Elon Musk" width="200">
    <h1>💸 Spend Elon's Money 💸</h1>
    </center>
    
    <div id="balance">
        <h2>Balance: <span id="balance-amount">$830,000,000,000</span></h2>
    </div>

    <div id="items">
        <div class="item">
            <img class="item-image" src="img/coca-cola.jpg" alt="Coca Cola">
            <h3>Coca Cola</h3>
            <p class="price">$2</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/burger.jpg" alt="Burger">
            <h3>Burger</h3>
            <p class="price">$6</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/pizza.jpg" alt="Pizza">
            <h3>Pizza</h3>
            <p class="price">$10</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/slipper.jpg" alt="Slipper">
            <h3>Slipper</h3>
            <p class="price">$24.00</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/neuralink.jpg" alt="Neuralink Implant">
            <h3>Neuralink Implant</h3>
            <p class="price">$10,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/cybertruck.jpg" alt="Tesla Cybertruck">
            <h3>Tesla Cybertruck</h3>
            <p class="price">$80,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/model-s.jpg" alt="Tesla Model S">
            <h3>Tesla Model S</h3>
            <p class="price">$85,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image" src="img/rocket.jpg" alt="SpaceX Rocket Launch">
            <h3>SpaceX Rocket Launch</h3>
            <p class="price">$67,000,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
        <div class="item">
            <img class="item-image logo-image" src="img/x.jpg" alt="Twitter X">
            <h3>Twitter (X)</h3>
            <p class="price">$44,000,000,000</p>
            <div class="controls">
                <button class="decrement">-</button>
                <span class="quantity">1</span>
                <button class="increment">+</button>
                <button class="buy">Buy</button>
                <button class="sell">Sell</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
